name: period_close
version: 1
trigger:
  source: pipeline:period_close
# Phase 4.A — wiki nodes:
#   read-wiki         eagerly pulls Living Rule Wiki pages with applies_to
#                     overlapping ["period_close", "anomaly_detection"].
#                     Caller passes trigger_payload.wiki_tags to specialise.
#   draft-post-mortem agentic: drafts a post-mortem from the run signals.
#   write-post-mortem auto-files the draft (or routes to review_queue when
#                     the agent set requires_human_ratification=true).
nodes:
  - id: read-wiki
    tool: tools.wiki_reader:run
  - id: compute-trial-balance
    tool: tools.period_aggregator:compute_trial_balance
  - id: compute-open-entries
    tool: tools.period_aggregator:compute_open_entries
    depends_on: [compute-trial-balance]
  - id: compute-vat
    tool: tools.vat_calculator:compute_vat_return
    depends_on: [compute-trial-balance]
  - id: flag-anomalies
    agent: agents.anomaly_flag:run
    runner: anthropic
    depends_on: [compute-trial-balance, compute-open-entries, compute-vat, read-wiki]
  - id: summarize-period
    tool: tools.period_aggregator:summarize_period
    depends_on: [flag-anomalies]
  - id: gate-confidence
    tool: tools.confidence_gate:run
    depends_on: [summarize-period]
  - id: render-report
    tool: tools.report_renderer:render
    depends_on: [summarize-period, gate-confidence]
    when: conditions.reporting:passes_report_confidence
  - id: queue-review
    tool: tools.review_queue:enqueue
    depends_on: [summarize-period, gate-confidence]
    when: conditions.gating:needs_review
  - id: draft-post-mortem
    agent: agents.wiki_post_mortem:run
    runner: anthropic
    depends_on: [summarize-period, gate-confidence, flag-anomalies]
  - id: write-post-mortem
    tool: tools.wiki_writer:run
    depends_on: [draft-post-mortem]
